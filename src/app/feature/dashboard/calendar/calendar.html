
@if (!connected()) {
  <section class="card card--centered">
    <div class="icon-badge">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="4" width="18" height="18" rx="2"></rect>
        <line x1="16" y1="2" x2="16" y2="6"></line>
        <line x1="8" y1="2" x2="8" y2="6"></line>
        <line x1="3" y1="10" x2="21" y2="10"></line>
      </svg>
    </div>
    <p class="title">Connect Google Calendar</p>
    <p class="subtitle">See your events alongside everything else here. You can disconnect anytime.</p>
    <button class="btn btn--primary"  (click)="connect()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
        <path d="M12.24 10.285V14.4h6.806c-.275 1.765-2.056 5.174-6.806 5.174-4.095 0-7.439-3.389-7.439-7.574s3.344-7.574 7.439-7.574c2.33 0 3.891.989 4.785 1.849l3.254-3.138C18.189 1.186 15.479 0 12.24 0c-6.635 0-12 5.365-12 12s5.365 12 12 12c6.926 0 11.52-4.869 11.52-11.726 0-.788-.085-1.39-.189-1.989H12.24z"/>
      </svg>
      Connect with Google
    </button>
 
  </section>
}
@if (connected()) {
  <section class="connected">
    <div class="status-bar">
      <div class="status-bar__account">
        <div class="avatar">ms</div>
        <div>
          <p class="account-email">ms</p>
          <p class="sync-time">ms</p>
        </div>
      </div>
      <button class="btn btn--outline"  (click)="disconnect()">
      </button>
    </div>
    <p class="section-label">This week</p>
    <div class="calendar">
      <div></div>
   
    </div>
  </section>
}
