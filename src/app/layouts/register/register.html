<div class="flex min-h-screen bg-[#121212] font-sans antialiased" dir="">
  <main class="flex flex-1 flex-col items-center justify-center px-6 py-12 lg:px-8">
    <div class="w-full max-w-md space-y-8">
      <div class="max-w-md mx-auto my-10 p-7 bg-gradient-to-b from-[#1c1c1c] to-[#171717] rounded-3xl border border-gray-800/80 shadow-2xl shadow-black/40">

        <div class="flex items-center justify-between mb-7">
          <div class="inline-flex items-center gap-1.5 bg-[#5c6bc0]/10 text-[#818cf8] text-[11px] font-bold tracking-wide px-3 py-1.5 rounded-full border border-[#5c6bc0]/20">
            <i class="fa-solid fa-user text-[12px]"></i>
            <span>Password ACCOUNT</span>
          </div>
        </div>

        <!-- Verifying invite -->
        @if (isVerifying()) {
          <div class="flex items-center justify-center py-10 text-gray-400 text-sm gap-2">
            <i class="fa-solid fa-spinner fa-spin text-[15px]"></i>
            Verifying your invitation...
          </div>
        }

        <!-- Invalid / errored before form ever showed -->
        @else if (!isTokenValid()) {
          <div class="text-center py-6">
            <p class="text-[13px] text-red-400 mb-4">{{ errorMessage() }}</p>
            <a routerLink="/login" class="text-[13px] text-[#818cf8] font-semibold hover:underline">Back to login</a>
          </div>
        }

        <!-- Valid token: show the form -->
        @else {
          <form class="space-y-4" [formGroup]="form" (ngSubmit)="onSubmit()">

            <div class="space-y-1.5">
              <label class="text-[12px] font-semibold text-gray-400">Password</label>
              <div class="flex items-center gap-2.5 border border-gray-800 bg-[#222] rounded-xl px-3.5 h-11 transition-all duration-200 focus-within:border-[#5c6bc0] focus-within:bg-[#1e1e1e] focus-within:ring-2 focus-within:ring-[#5c6bc0]/20">
                <i class="fa-solid fa-lock text-[15px] text-gray-500"></i>
                <input
                  [type]="showPassword() ? 'text' : 'password'"
                  formControlName="password"
                  placeholder="••••••••"
                  class="bg-transparent border-none outline-none text-[14px] text-white w-full placeholder:text-gray-600 focus:ring-0">
                <button
                  type="button"
                  (click)="showPassword.set(!showPassword())"
                  class="text-gray-500 hover:text-gray-300 transition-colors cursor-pointer focus:outline-none">
                  <i class="fa-solid text-[15px]" [class.fa-eye]="!showPassword()" [class.fa-eye-slash]="showPassword()"></i>
                </button>
              </div>
            </div>

            <div class="space-y-1.5 mb-2">
              <label class="text-[12px] font-semibold text-gray-400">Confirm Password</label>
              <div class="flex items-center gap-2.5 border border-gray-800 bg-[#222] rounded-xl px-3.5 h-11 transition-all duration-200 focus-within:border-[#5c6bc0] focus-within:bg-[#1e1e1e] focus-within:ring-2 focus-within:ring-[#5c6bc0]/20">
                <i class="fa-solid fa-lock text-[15px] text-gray-500"></i>
                <input
                  [type]="showConfirmPassword() ? 'text' : 'password'"
                  formControlName="confirmPassword"
                  placeholder="••••••••"
                  class="bg-transparent border-none outline-none text-[14px] text-white w-full placeholder:text-gray-600 focus:ring-0">
                <button
                  type="button"
                  (click)="showConfirmPassword.set(!showConfirmPassword())"
                  class="text-gray-500 hover:text-gray-300 transition-colors cursor-pointer focus:outline-none">
                  <i class="fa-solid text-[15px]" [class.fa-eye]="!showConfirmPassword()" [class.fa-eye-slash]="showConfirmPassword()"></i>
                </button>
              </div>
            </div>

            @if (passwordsMismatch) {
              <p class="text-[12px] text-red-400 -mt-2 mb-2 flex items-center gap-1">
                <i class="fa-solid fa-circle-exclamation text-[12px]"></i>
                Passwords do not match.
              </p>
            }
            @if (errorMessage()) {
              <p class="text-[12px] text-red-400 -mt-2 mb-2 flex items-center gap-1">
                <i class="fa-solid fa-circle-exclamation text-[12px]"></i>
                {{ errorMessage() }}
              </p>
            }

            <button
              type="submit"
              [disabled]="isSubmitting()"
              class="w-full h-12 bg-gradient-to-b from-[#5c6bc0] to-[#4c5aa6] hover:from-[#6b79c9] hover:to-[#4c5aa6] disabled:opacity-60 disabled:cursor-not-allowed text-white rounded-xl text-[14px] font-bold tracking-wide cursor-pointer flex items-center justify-center gap-2 transition-all duration-150 active:scale-[0.99] pt-0.5 focus:outline-none shadow-lg shadow-[#5c6bc0]/25">
              @if (!isSubmitting()) {
                <span>Complete Registration</span>
                <i class="fa-solid fa-check text-[15px]"></i>
              } @else {
                <span>Submitting...</span>
                <i class="fa-solid fa-spinner fa-spin text-[15px]"></i>
              }
            </button>
          </form>
        }
      </div>
    </div>
  </main>
</div>
